version: '3.8'

services:
  astro-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true

  astro-prod:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALLER: npm
    ports:
      - "8080:80"
    profiles:
      - production
