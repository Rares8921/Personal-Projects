<div class="auth-wrapper">
  <div class="auth-card">
    <div class="card-header">
      <div class="brand-badge">Recovery</div>
      <h2>Lost Credentials?</h2>
    </div>

    <div class="info-box">
      Enter your verified email address. The system will generate a secure reset link.
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>Target Email</label>
        <div class="input-wrapper">
          <input type="email" class="form-control" formControlName="email" placeholder="user@domain.com" />
        </div>
        <div *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid" class="error-msg">
          Valid email required.
        </div>
      </div>

      <button type="submit" class="btn-tech" [disabled]="loading || forgotForm.invalid">
        <span *ngIf="!loading">RECOVERY</span>
        <span *ngIf="loading">PROCESSING...</span>
      </button>

      <div *ngIf="message" class="alert-box success">{{ message }}</div>
      <div *ngIf="error" class="alert-box error">{{ error }}</div>
    </form>

    <div class="card-footer">
      <a routerLink="/login" class="tech-link">Return to sign in</a>
    </div>
  </div>
</div>
