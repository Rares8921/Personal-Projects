<div class="search-container">
  <h2>Search Results for "{{ query }}"</h2>

  <div *ngIf="loading" class="cyber-loader center"></div>

  <div *ngIf="!loading && users.length === 0" class="no-results">
    <p>No users found matching your query.</p>
  </div>

  <div class="results-grid" *ngIf="!loading && users.length > 0">
    <div *ngFor="let user of users" class="user-card">
      <img [src]="user.avatarUrl || 'assets/static/default-avatar.jpg'" alt="Avatar" class="avatar">
      
      <div class="user-info">
        <h3>
          <a [routerLink]="['/user', user.username]" class="username-link">
            {{ user.username }}
          </a>
        </h3>
        <p class="fullname" *ngIf="user.fullName">{{ user.fullName }}</p>
        <p class="bio" *ngIf="user.bio">{{ user.bio }}</p>
      </div>

      <div class="actions">
        <a [routerLink]="['/user', user.username]" class="btn-tech-outline sm">View Profile</a>
      </div>
    </div>
  </div>
</div>
