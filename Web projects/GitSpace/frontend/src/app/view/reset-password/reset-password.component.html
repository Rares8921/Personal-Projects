<div class="auth-wrapper">
  <div class="auth-card">
    <div class="card-header">
      <div class="brand-badge">Update</div>
      <h2>Set New Key</h2>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrapper has-icon">
          <input [type]="hidePassword ? 'password' : 'text'" class="form-control" formControlName="password" placeholder="********"/>
          <span class="toggle-icon" (click)="togglePassword()">
            {{ hidePassword ? '👁' : '✕' }}
          </span>
        </div>
        <div *ngIf="f.password.touched && f.password.errors?.pattern" class="error-msg">
          Weak: Need 8+ chars, 1 digit, 1 special.
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" class="form-control" formControlName="confirmPassword" placeholder="********"/>
        </div>
        <div *ngIf="resetForm.hasError('mismatch') && f.confirmPassword.touched" class="error-msg">
          Keys do not match.
        </div>
      </div>

      <button type="submit" class="btn-tech" [disabled]="loading || resetForm.invalid">
        Update credentials
      </button>

      <div *ngIf="message" class="alert-box success">{{ message }}</div>
      <div *ngIf="error" class="alert-box error">{{ error }}</div>
    </form>
  </div>
</div>
